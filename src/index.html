<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Rigo with Vanilla.js</title>

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body class="bg-black">
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
  <div class="d-flex justify-content-center align-items-center mt-3">
    <button type="button " class="btn btn-info" onClick="window.location.reload();"
      class=" p-4 bg-text-dark">Refresh</button>
  </div>
  <div class="container-fluid text-center text-white">
    <h1 class="mt-5">Random Card Generator</h1>
    <div class="d-flex justify-content-center align-items-center mt-5">
      <!-- card will be generate here -->
      <div id="card-container" class="card" style="width: 10rem;">
        <div class="card-body">
          <h5 class="card-title" id="card-title">Card Title</h5>
          <p class="card-text" id="card-text">.</p>
          <div>
            <img src="your-image.jpg" class="position-absolute bottom-0 end-0 m-2"
              style="width: 50px; transform: scaleX(-1);" alt="Flipped icon">
          </div>
        </div>
      </div>


    </div>
  </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
</body>

</html>
